{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}InvPro{% endblock %}</title>

  <!-- Preload critical assets -->
  <link rel="preload" href="{% static 'css/dist/styles.css' %}" as="style">
  <link rel="preload" href="{% static 'js/main.js' %}" as="script">

  <!-- Styles -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="{% static 'css/dist/styles.css' %}" rel="stylesheet">
  {% block extra_css %}{% endblock %}

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="{% static 'js/main.js' %}" defer></script>
  {% block extra_js %}{% endblock %}
</head>

<body class="bg-gradient-to-br from-purple-50 to-pink-50 min-h-screen">
  <!-- Particles Container -->
  <div id="particles-js" class="fixed inset-0 pointer-events-none"></div>

  <!-- Content Wrapper -->
  <div class="content-wrapper relative z-10">
    <!-- Navigation -->
    <nav class="bg-white shadow-lg">
      <!-- ... existing navigation code ... -->
    </nav>

    <!-- Main Content -->
    <main>
      {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-white shadow-lg mt-32">
      <!-- ... existing footer code ... -->
    </footer>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="fixed bottom-4 right-4 z-50"></div>

  <!-- Initialize Particles -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      particlesJS('particles-js', {
        particles: {
          number: { value: 80 },
          color: { value: '#7e22ce' },
          shape: { type: 'circle' },
          opacity: {
            value: 0.5,
            random: true
          },
          size: {
            value: 3,
            random: true
          },
          line_linked: {
            enable: true,
            distance: 150,
            color: '#7e22ce',
            opacity: 0.4,
            width: 1
          },
          move: {
            enable: true,
            speed: 2,
            direction: 'none',
            random: true,
            straight: false,
            out_mode: 'out',
            bounce: false
          }
        },
        interactivity: {
          detect_on: 'canvas',
          events: {
            onhover: { enable: true, mode: 'repulse' },
            onclick: { enable: true, mode: 'push' },
            resize: true
          }
        },
        retina_detect: true
      });
    });
  </script>
</body>

</html>
